<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>JAXA Earth API for JavaScript</title>

	<link href="../assets/style.css" rel="stylesheet">
	<script src="../assets/script.js" type="module"></script>
</head>

<body>
	<p>
		je.ImageCollection、je.Imageを用いた例。一部の実行結果はブラウザのコンソールに出力されます。
	</p>
	<p>
		je.ImageCollectionでは、データセットに含まれる時系列方向の探索、バンドの種類などの情報を扱います。
		je.ImageCollectionで日時とバンドを指定することで、je.Imageを取得します。
		je.Imageで緯度経度範囲と出力サイズを指定することで必要なデータ（DataObject）を取得できます。
	</p>

	<script src="script.js" type="module"></script>
</body>

</html>
