<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>JAXA Earth API for JavaScript</title>

	<link href="../assets/style.css" rel="stylesheet">
	<script src="../assets/script.js" type="module"></script>

	<!-- https://plotly.com/javascript/ -->
	<script src="https://cdn.plot.ly/plotly-3.3.0.min.js" charset="utf-8"></script>
</head>

<body>
	<p>
		時系列のデータを取得し、アニメーション表示してグラフ化も行う例です。
		je.data.computeを利用して、場所ごとの季節変化量を求めた画像も作成します。
		グラフ表示にはPlotlyを利用します。
		一部の実行結果はブラウザのコンソールに出力されます。
	</p>

	<div id="status">読み込み中...</div>
	
	<!-- アニメーション表示用 -->
	<h2>アニメーション</h2>
	<img id="img"><br>
	<div id="yyyymm"></div>
	<img id="cm"><br>

	
	<!-- 変化量表示用 -->
	<h2>場所ごとの季節変化量</h2>
	<img id="img2"><br>
	<img id="cm2"><br>
	<br>

	<!-- グラフ表示用 -->
	<h2>グラフ</h2>
	<div id="chart"></div>

	<script src="script.js" type="module"></script>
</body>

</html>
