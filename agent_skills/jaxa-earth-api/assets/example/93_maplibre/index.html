<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>JAXA Earth API for JavaScript</title>

	<link href="../assets/style.css" rel="stylesheet">
	<script src="../assets/script.js" type="module"></script>
	
	
	<script src="https://unpkg.com/maplibre-gl@^5.17.0/dist/maplibre-gl.js"></script>
	<link href="https://unpkg.com/maplibre-gl@^5.17.0/dist/maplibre-gl.css" rel="stylesheet" />

	<style>
		#map {
			width: 800px;
			height: 400px;
			border: solid 1px gray;
			background-color: #000;

	<p>

	</p>
	<p>
		背景地図には<a href="https://www.openstreetmap.org/" target="_blank">OpenStreetMap</a>を利用しています。

	<div id="map"></div>

	<script src="script.js" type="module"></script>
