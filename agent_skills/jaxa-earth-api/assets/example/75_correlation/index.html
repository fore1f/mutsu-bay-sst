<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>JAXA Earth API for JavaScript</title>

	<link href="../assets/style.css" rel="stylesheet">
	<script src="../assets/script.js" type="module"></script>
	
	<!-- https://plotly.com/javascript/ -->
	<script src="https://cdn.plot.ly/plotly-3.3.0.min.js" charset="utf-8"></script>
</head>

<body>
	<p>
		標高と地表面温度の関係を解析します。
		グラフ表示にはPlotlyを利用します。
		一部の実行結果はブラウザのコンソールに出力されます。
	</p>

	<h2>標高</h2>
	<!-- 画像表示用 -->
	<img src="" id="img1">

	<!-- カラーマップ表示用 -->
	<img src="" id="cm1">
	
	<h2>地表面温度</h2>
	<!-- 画像表示用 -->
	<img src="" id="img2">

	<!-- カラーマップ表示用 -->
	<img src="" id="cm2">

	<!-- グラフ表示用 -->
	<h2>相関関係（標高X[m]、地表面温度Y[℃]）</h2>
	<div id="chart"></div>

	<h2>回帰直線の傾き</h2>
	<div id="slope"></div>
	<p>
		標高が100m上がると気温が0.6℃下がるという関係（-0.006℃/m）が有名ですが、地表面温度にも似た傾向があることが分かります。
	</p>
	
	<script src="script.js" type="module"></script>
</body>

</html>
