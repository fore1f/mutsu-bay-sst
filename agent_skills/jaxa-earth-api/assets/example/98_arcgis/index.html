<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>JAXA Earth API for JavaScript</title>

	<link href="../assets/style.css" rel="stylesheet">
	<script src="../assets/script.js" type="module"></script>
	
	<link rel="stylesheet" href="https://js.arcgis.com/4.34/esri/themes/light/main.css" />
	<script type="importmap">
		{
			"imports": {
				"@arcgis/": "https://js.arcgis.com/4.34/@arcgis/"
			}
		}
	</script>

	<style>
		#map {
			width: 800px;
			height: 400px;
			border: solid 1px gray;
			background-color: #ccc;
		}
	</style>
</head>

<body>
	<p>
		ArcGIS Maps SDK for JavaScriptと連携する例。一部の実行結果はブラウザのコンソールに出力されます。
		このサンプルにおいては、地形の3D形状についてはArcGISのTerrain 3Dレイヤーが利用されており、JAXA Earth APIのAW3Dのデータから作成された画像を重ねて表示しています。
	</p>

	<!-- 地図表示 -->
	<div id="map"></div>

	<!-- 状況表示 -->
	<div id="status"></div>

	<script src="script.js" type="module"></script>
</body>

</html>
