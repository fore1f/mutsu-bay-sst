<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>JAXA Earth API for JavaScript</title>

	<link href="../assets/style.css" rel="stylesheet">
	<script src="../assets/script.js" type="module"></script>
	
	<script src="https://cdn.jsdelivr.net/npm/ol@v10.7.0/dist/ol.js"></script>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.7.0/ol.css">
	
	<style>
		#map {
			width: 800px;
			height: 400px;
			border: solid 1px gray;
			background-color: #ccc;
		}
	</style>
</head>

<body>
	<p>
		ol.source.ImageCanvasを利用して連携する例（EPSG:3857編）。地図をクリックするとその点の値を表示します。一部の実行結果はブラウザのコンソールに出力されます。
	</p>
	<p>
		背景地図には<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank">国土地理院の地理院タイル</a>を利用しています。
	</p>

	<!-- 地図表示 -->
	<div id="map"></div>

	<!-- 状況表示 -->
	<div id="status"></div>

	<script src="script.js" type="module"></script>
</body>

</html>
