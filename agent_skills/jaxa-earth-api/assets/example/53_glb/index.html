<body>
	<p>
		Three.jsを用いた例。AW3Dの地形データから3D形状を作成し、地表面温度の画像をテクスチャとして貼り付けています。
		3DモデルはGLBファイルとしてダウンロードできます。
		一部の実行結果はブラウザのコンソールに出力されます。
	</p>
	<p>
		気候変動観測衛星「しきさい」（GCOM-C）による地表面温度の観測時間帯は午前10時半頃であり、富士山の南東斜面に日光が良く当たることで地表面温度が高くなっています。
	</p>

	<!-- 3D表示画面 -->
	<div id="viewer"></div><br>

	<!-- ダウンロード用のボタン -->
	<button id="download">GLBファイルをダウンロード</button>
